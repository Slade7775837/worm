<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  html,body{
    margin:0; padding:0; height:100%;
    background:#0d1410;
    overflow:hidden;
  }
  #bar{
    position:fixed; top:0; left:0; right:0;
    display:flex; gap:8px; align-items:center;
    flex-wrap:wrap;
    padding:8px;
    background:#000;
    z-index:2;
  }
  #bar button{
    font-size:26px;
    background:#222;
    border:2px solid transparent;
    border-radius:6px;
    padding:6px 10px;
    cursor:pointer;
    color:#eee;
    position:relative;
  }
  #bar button.active{
    border-color:#5fd15f;
    background:#2a3a2a;
  }
  #bar button.toggle{
    font-size:16px;
    font-weight:bold;
  }
  #bar button.toggle.active{
    border-color:#e0b23c;
    background:#3a3320;
  }
  #bar #pauseBtn.active{
    border-color:#e05f5f;
    background:#3a2a2a;
  }
  #sep{
    width:1px; height:30px;
    background:#333;
    margin:0 2px;
  }
  #wallThickness{
    width:80px;
    accent-color:#7a5a3a;
  }
  #wormColor{
    width:42px; height:42px;
    border:2px solid #444;
    border-radius:8px;
    background:none;
    cursor:pointer;
    padding:0;
  }
  #board{
    position:fixed;
    left:0; right:0; bottom:0;
    background:#1b2a1b;
    cursor:crosshair;
    touch-action:none;
  }
  canvas{ display:block; width:100%; height:100%; }
</style>
</head>
<body>

<div id="bar">
  <button id="placementToggle" class="toggle" data-placement="single">🎯</button>

  <div id="sep"></div>

  <button class="modebtn active" data-mode="food" data-food-index="0">🫐</button>
  <button class="modebtn" data-mode="food" data-food-index="1">🍎</button>
  <button class="modebtn" data-mode="food" data-food-index="2">🍌</button>
  <button class="modebtn" data-mode="food" data-food-index="3">🍉</button>

  <div id="sep"></div>

  <button class="modebtn" data-mode="worm">🐛</button>
  <button id="randomColorBtn">🎲</button>
  <input type="color" id="wormColor" value="#4aa3df">

  <div id="sep"></div>

  <button class="modebtn" data-mode="wall">🧱</button>
  <input type="range" id="wallThickness" min="6" max="40" value="16">
  <button class="modebtn" data-mode="delete">🗑️</button>
  <button data-mode="clear">❌</button>
  <button id="pauseBtn">⏸️</button>
</div>

<div id="board">
  <canvas id="c"></canvas>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const board = document.getElementById('board');
const bar = document.getElementById('bar');
const wormColorInput = document.getElementById('wormColor');
const wallThicknessInput = document.getElementById('wallThickness');

function layout(){
  board.style.top = bar.offsetHeight + 'px';
  canvas.width = board.clientWidth;
  canvas.height = board.clientHeight;
}
window.addEventListener('resize', layout);

// ---------- tipos de comida: de menos a más nutritivos ----------
const FOOD_TYPES = [
  {emoji:'🫐', value:1},
  {emoji:'🍎', value:2},
  {emoji:'🍌', value:3},
  {emoji:'🍉', value:5}
];

let mode = 'food';
let selectedFoodIndex = 0;
let placementMode = 'single'; // 'single' o 'plant'
let paused = false;

document.querySelectorAll('.modebtn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.modebtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    if(mode === 'food') selectedFoodIndex = parseInt(btn.dataset.foodIndex, 10);
  });
});

document.querySelector('[data-mode="clear"]').addEventListener('click', ()=>{
  foods = []; plants = []; worms = []; matingEvents = []; walls = []; drawingWall = null; erasing = false;
  document.querySelectorAll('.modebtn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.modebtn[data-mode="food"][data-food-index="0"]').classList.add('active');
  mode = 'food';
  selectedFoodIndex = 0;
});

const placementToggle = document.getElementById('placementToggle');
placementToggle.addEventListener('click', ()=>{
  placementMode = placementMode === 'single' ? 'plant' : 'single';
  placementToggle.dataset.placement = placementMode;
  placementToggle.textContent = placementMode === 'single' ? '🎯' : '🌱';
  placementToggle.classList.toggle('active', placementMode === 'plant');
});

const pauseBtn = document.getElementById('pauseBtn');
pauseBtn.addEventListener('click', ()=>{
  paused = !paused;
  pauseBtn.textContent = paused ? '▶️' : '⏸️';
  pauseBtn.classList.toggle('active', paused);
});

document.getElementById('randomColorBtn').addEventListener('click', ()=>{
  wormColorInput.value = randomHexColor();
});

// ---------- color helpers ----------
function hexToRgb(hex){
  const n = parseInt(hex.slice(1),16);
  return [(n>>16)&255, (n>>8)&255, n&255];
}
function randomColor(){
  return [60+Math.random()*170, 60+Math.random()*170, 60+Math.random()*170].map(Math.round);
}
function randomHexColor(){
  return '#' + randomColor().map(v=>v.toString(16).padStart(2,'0')).join('');
}
function mixColor(c1, c2){
  return c1.map((v,i)=>{
    const base = (v + c2[i]) / 2;
    const mutated = base + (Math.random()-0.5)*30;
    return Math.max(30, Math.min(225, Math.round(mutated)));
  });
}
function darken(c, f=0.62){
  return c.map(v=>Math.round(v*f));
}

let foods = [];
let plants = [];
let worms = [];
let matingEvents = [];
let walls = [];
let drawingWall = null;

const SPACING = 5;
const SEG_R = 8;
const EAT_R = 16;
const MATE_R = 45;
const MAX_FOOD = 45;
const MATURE_LEN = 14;
const MAX_LEN = 40;
const MATE_COOLDOWN = 600;
const PICK_R = 20;
const SEP_R = 22;
const WALL_MARGIN = 55;
const WALL_AVOID_R = 70;
const WALL_HARD_R = 18;
const WALL_MIN_POINT_DIST = 5;

const LIFESPAN = 60000;
const GRAY_START = LIFESPAN - 15000;
const MATING_DURATION = 3000;
const ORBIT_R = 24;

function makeWorm(x, y, length=5, color=null){
  const w = {
    trail: [],
    length,
    speed: 1.8 + Math.random()*0.4,
    angle: Math.random()*Math.PI*2,
    x, y,
    color: color || randomColor(),
    cooldown: 0,
    dragging:false,
    mating:false,
    dead:false,
    deathTime:null,
    birth: Date.now(),
    wanderSeed: Math.random()*1000,
    target: null,
    wallSide: 0
  };
  for(let i=0;i<300;i++) w.trail.push({x, y});
  return w;
}

layout();
worms.push(makeWorm(canvas.width/2, canvas.height/2));

function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }

function distToSegment(px, py, ax, ay, bx, by){
  const dx=bx-ax, dy=by-ay;
  const lenSq = dx*dx+dy*dy;
  let t = lenSq>0 ? ((px-ax)*dx+(py-ay)*dy)/lenSq : 0;
  t = Math.max(0, Math.min(1,t));
  const cx = ax+dx*t, cy = ay+dy*t;
  return { d: Math.hypot(px-cx, py-cy), cx, cy };
}

function nearestWallPoint(x, y){
  let best=null, bg=Infinity;
  for(const wall of walls){
    const pts = wall.points;
    const half = (wall.thickness||16)/2;
    for(let i=0;i<pts.length-1;i++){
      const res = distToSegment(x,y, pts[i].x,pts[i].y, pts[i+1].x,pts[i+1].y);
      const gap = res.d - half;
      if(gap < bg){ bg=gap; best={d:gap, cx:res.cx, cy:res.cy}; }
    }
  }
  return best;
}

function eraseWallAt(pos, radius){
  const result = [];
  for(const wall of walls){
    let current = [];
    for(const p of wall.points){
      if(dist(p,pos) > radius){
        current.push(p);
      } else if(current.length >= 2){
        result.push({points:current, thickness:wall.thickness});
        current = [];
      } else {
        current = [];
      }
    }
    if(current.length >= 2) result.push({points:current, thickness:wall.thickness});
  }
  walls = result;
}

// ---------- interacción: click para colocar, arrastrar, borrar ----------
let dragTarget = null;
let erasing = false;
const ERASE_R = 20;

function findNearEntity(pos, maxR){
  let best=null, bd=Infinity, btype=null;
  for(const f of foods){ const d=dist(pos,f); if(d<bd && d<maxR){bd=d; best=f; btype='food';} }
  for(const p of plants){ const d=dist(pos,p); if(d<bd && d<maxR){bd=d; best=p; btype='plant';} }
  for(const w of worms){ const d=dist(pos,w); if(d<bd && d<maxR){bd=d; best=w; btype='worm';} }
  return best ? {type:btype, ref:best, d:bd} : null;
}

function getPos(e){
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX-rect.left, y: e.clientY-rect.top };
}

board.addEventListener('pointerdown', (e)=>{
  const pos = getPos(e);

  if(mode === 'wall'){
    drawingWall = {points:[pos], thickness: parseFloat(wallThicknessInput.value)};
    walls.push(drawingWall);
    board.setPointerCapture(e.pointerId);
    return;
  }

  if(mode === 'delete'){
    const found = findNearEntity(pos, PICK_R);
    if(found){
      if(found.type==='food') foods.splice(foods.indexOf(found.ref),1);
      else if(found.type==='plant') plants.splice(plants.indexOf(found.ref),1);
      else if(found.type==='worm') worms.splice(worms.indexOf(found.ref),1);
      return;
    }
    erasing = true;
    eraseWallAt(pos, ERASE_R);
    board.setPointerCapture(e.pointerId);
    return;
  }

  const found = findNearEntity(pos, PICK_R);
  if(found){
    dragTarget = found;
    if(found.type==='worm') found.ref.dragging = true;
    board.setPointerCapture(e.pointerId);
    return;
  }

  if(mode === 'food'){
    const ft = FOOD_TYPES[selectedFoodIndex];
    if(placementMode === 'single'){
      foods.push({x:pos.x, y:pos.y, emoji:ft.emoji, value:ft.value});
    } else {
      plants.push({x:pos.x, y:pos.y, timer: 120 + Math.random()*180, foodIndex: selectedFoodIndex});
    }
  } else if(mode === 'worm'){
    worms.push(makeWorm(pos.x, pos.y, 5, hexToRgb(wormColorInput.value)));
  }
});

board.addEventListener('pointermove', (e)=>{
  const pos = getPos(e);
  if(erasing){
    eraseWallAt(pos, ERASE_R);
    return;
  }
  if(drawingWall){
    const last = drawingWall.points[drawingWall.points.length-1];
    if(dist(last,pos) > WALL_MIN_POINT_DIST) drawingWall.points.push(pos);
    return;
  }
  if(!dragTarget) return;
  dragTarget.ref.x = pos.x;
  dragTarget.ref.y = pos.y;
});

board.addEventListener('pointerup', (e)=>{
  erasing = false;
  if(drawingWall){
    if(drawingWall.points.length < 2) walls.splice(walls.indexOf(drawingWall), 1);
    drawingWall = null;
  }
  if(dragTarget && dragTarget.type==='worm') dragTarget.ref.dragging = false;
  dragTarget = null;
});
board.addEventListener('pointercancel', ()=>{
  erasing = false;
  if(drawingWall){
    if(drawingWall.points.length < 2) walls.splice(walls.indexOf(drawingWall), 1);
    drawingWall = null;
  }
  if(dragTarget && dragTarget.type==='worm') dragTarget.ref.dragging = false;
  dragTarget = null;
});

// ---------- lógica del ecosistema ----------
function nearestUnclaimedFood(pos){
  let best=null, bd=Infinity;
  for(const f of foods){
    if(f.claimed) continue;
    const d = dist(pos,f);
    if(d<bd){ bd=d; best=f; }
  }
  return {food:best, d:bd};
}

function updatePlants(){
  if(foods.length >= MAX_FOOD) return;
  for(const p of plants){
    p.timer--;
    if(p.timer<=0){
      p.timer = 150 + Math.random()*250;
      const ang = Math.random()*Math.PI*2;
      const rad = 15 + Math.random()*35;
      const ft = FOOD_TYPES[p.foodIndex ?? 0];
      foods.push({x: p.x+Math.cos(ang)*rad, y: p.y+Math.sin(ang)*rad, emoji: ft.emoji, value: ft.value});
    }
  }
}

function pushTrail(w){
  w.trail.unshift({x:w.x, y:w.y});
  const maxTrail = SPACING*(w.length+2);
  if(w.trail.length > maxTrail) w.trail.length = maxTrail;
}

function updateMatingEvents(){
  for(let i=matingEvents.length-1; i>=0; i--){
    const ev = matingEvents[i];
    const elapsed = Date.now() - ev.start;
    const t = Math.min(elapsed/ev.duration, 1);
    const ang = t * Math.PI*4;

    ev.a.x = ev.cx + Math.cos(ang)*ORBIT_R;
    ev.a.y = ev.cy + Math.sin(ang)*ORBIT_R;
    ev.b.x = ev.cx + Math.cos(ang+Math.PI)*ORBIT_R;
    ev.b.y = ev.cy + Math.sin(ang+Math.PI)*ORBIT_R;
    pushTrail(ev.a);
    pushTrail(ev.b);

    if(elapsed >= ev.duration){
      worms.push(makeWorm(ev.cx, ev.cy, ev.childLen, ev.childColor));
      ev.a.mating = false;
      ev.b.mating = false;
      matingEvents.splice(i,1);
    }
  }
}

function updateWorms(){
  for(const f of foods) f.claimed = false;

  for(const w of worms){
    if(w.dead || w.mating || w.dragging){
      continue;
    }

    const age = Date.now() - w.birth;
    if(age >= LIFESPAN){
      w.dead = true;
      w.deathTime = Date.now();
      continue;
    }

    const slowT = Math.max(0, Math.min(1, (age-GRAY_START)/(LIFESPAN-GRAY_START)));
    const speedMul = 1 - slowT;

    if(w.cooldown>0) w.cooldown--;

    // ---- objetivo persistente (evita que titubeen cambiando de idea cada frame) ----
    let target = w.target;
    if(target){
      if(target.type==='food' && foods.indexOf(target.ref)===-1) target = null;
      else if(target.type==='mate' && (target.ref.dead || target.ref.mating || target.ref.length<MATURE_LEN)) target = null;
    }

    if(!target){
      const {food, d:foodD} = nearestUnclaimedFood(w);
      let mate=null, mateD=Infinity;
      if(w.length>=MATURE_LEN && w.cooldown<=0){
        for(const o of worms){
          if(o===w || o.dead || o.mating || o.length<MATURE_LEN || o.cooldown>0) continue;
          const dd = dist(w,o);
          if(dd<mateD){ mateD=dd; mate=o; }
        }
      }
      if(food && mate) target = foodD<=mateD ? {type:'food', ref:food} : {type:'mate', ref:mate};
      else if(food) target = {type:'food', ref:food};
      else if(mate) target = {type:'mate', ref:mate};
    }

    w.target = target;
    if(target && target.type==='food') target.ref.claimed = true;

    // ---- ángulo deseado: hacia el objetivo, o deambular de forma orgánica evitando las paredes ----
    let desiredAngle;
    if(target){
      desiredAngle = Math.atan2(target.ref.y-w.y, target.ref.x-w.x);
    } else {
      const noise = Math.sin(Date.now()*0.0006 + w.wanderSeed) + Math.sin(Date.now()*0.00023 + w.wanderSeed*1.7);
      let wx=0, wy=0;
      if(w.x < WALL_MARGIN) wx += (WALL_MARGIN - w.x);
      if(w.x > canvas.width-WALL_MARGIN) wx -= (w.x-(canvas.width-WALL_MARGIN));
      if(w.y < WALL_MARGIN) wy += (WALL_MARGIN - w.y);
      if(w.y > canvas.height-WALL_MARGIN) wy -= (w.y-(canvas.height-WALL_MARGIN));
      if(wx!==0 || wy!==0){
        desiredAngle = Math.atan2(wy, wx) + noise*0.3;
      } else {
        desiredAngle = w.angle + noise*0.05;
      }
    }

    // ---- separación: evita que se amontonen encima unos de otros ----
    let sepX=0, sepY=0;
    for(const o of worms){
      if(o===w || o.dead) continue;
      const dd = dist(w,o);
      if(dd < SEP_R && dd > 0){
        sepX += (w.x-o.x)/dd;
        sepY += (w.y-o.y)/dd;
      }
    }
    if(sepX!==0 || sepY!==0){
      const sepAngle = Math.atan2(sepY, sepX);
      let sdiff = sepAngle - desiredAngle;
      while(sdiff>Math.PI) sdiff-=Math.PI*2;
      while(sdiff<-Math.PI) sdiff+=Math.PI*2;
      desiredAngle += sdiff*0.35;
    }

    // ---- evasión de paredes: seguir el borde hacia donde de verdad quiere ir ----
    const nearWall = nearestWallPoint(w.x, w.y);
    if(nearWall && nearWall.d < WALL_AVOID_R){
      const nd = Math.max(0.001, Math.hypot(w.x-nearWall.cx, w.y-nearWall.cy));
      const nx = (w.x-nearWall.cx)/nd;
      const ny = (w.y-nearWall.cy)/nd;
      // las dos direcciones posibles a lo largo de la pared (tangentes)
      const t1x = -ny, t1y = nx;
      const t2x = ny, t2y = -nx;

      if(w.wallSide === 0){
        const wantX = Math.cos(desiredAngle), wantY = Math.sin(desiredAngle);
        const dot1 = t1x*wantX + t1y*wantY;
        const dot2 = t2x*wantX + t2y*wantY;
        w.wallSide = (dot1 >= dot2) ? 1 : -1;
      }
      const tx = w.wallSide === 1 ? t1x : t2x;
      const ty = w.wallSide === 1 ? t1y : t2y;
      const tangentAngle = Math.atan2(ty, tx);
      let tdiff = tangentAngle - desiredAngle;
      while(tdiff>Math.PI) tdiff-=Math.PI*2;
      while(tdiff<-Math.PI) tdiff+=Math.PI*2;
      const strength = 1 - (nearWall.d/WALL_AVOID_R);
      desiredAngle += tdiff * Math.min(1, strength*1.3+0.2);
    } else {
      w.wallSide = 0;
    }

    let diff = desiredAngle - w.angle;
    while(diff>Math.PI) diff-=Math.PI*2;
    while(diff<-Math.PI) diff+=Math.PI*2;
    w.angle += diff*0.12;

    // ---- colisión sólida: si avanzar nos mete en la pared, deslizar en vez de atravesar ----
    let vx = Math.cos(w.angle)*w.speed*speedMul;
    let vy = Math.sin(w.angle)*w.speed*speedMul;
    const wpBefore = nearestWallPoint(w.x, w.y);
    if(wpBefore && wpBefore.d < WALL_HARD_R + 6){
      const nd = Math.max(0.001, Math.hypot(w.x-wpBefore.cx, w.y-wpBefore.cy));
      const nx = (w.x-wpBefore.cx)/nd;
      const ny = (w.y-wpBefore.cy)/nd;
      const dot = vx*nx + vy*ny;
      if(dot < 0){
        vx -= dot*nx;
        vy -= dot*ny;
      }
    }
    w.x += vx;
    w.y += vy;
    w.x = Math.max(10, Math.min(canvas.width-10, w.x));
    w.y = Math.max(10, Math.min(canvas.height-10, w.y));

    // ---- empuje físico de respaldo para no atravesar la pared ----
    const wp = nearestWallPoint(w.x, w.y);
    if(wp && wp.d < WALL_HARD_R){
      const pushAngle = Math.atan2(w.y-wp.cy, w.x-wp.cx);
      const push = WALL_HARD_R - wp.d;
      w.x += Math.cos(pushAngle)*push;
      w.y += Math.sin(pushAngle)*push;
    }

    pushTrail(w);

    if(target && target.type==='food'){
      const d = dist(w, target.ref);
      if(d < EAT_R){
        const idx = foods.indexOf(target.ref);
        if(idx>-1){
          const gained = target.ref.value || 1;
          foods.splice(idx,1);
          w.length = Math.min(w.length+gained, MAX_LEN);
        }
        w.target = null;
      }
    }

    if(target && target.type==='mate'){
      const d = dist(w, target.ref);
      if(d < MATE_R && w.cooldown<=0 && target.ref.cooldown<=0 && !target.ref.mating){
        const aGiven = Math.floor(w.length/2);
        const bGiven = Math.floor(target.ref.length/2);
        w.length = Math.max(3, w.length - aGiven);
        target.ref.length = Math.max(3, target.ref.length - bGiven);
        const childLen = Math.max(4, aGiven + bGiven);
        const childColor = mixColor(w.color, target.ref.color);
        const cx = (w.x + target.ref.x)/2;
        const cy = (w.y + target.ref.y)/2;

        w.cooldown = MATE_COOLDOWN;
        target.ref.cooldown = MATE_COOLDOWN;
        w.mating = true;
        target.ref.mating = true;
        w.target = null;
        target.ref.target = null;

        matingEvents.push({a:w, b:target.ref, cx, cy, start:Date.now(), duration:MATING_DURATION, childLen, childColor});
      }
    }
  }

  worms = worms.filter(w => !(w.dead && Date.now()-w.deathTime > 1200));
}

function ageColor(w){
  const age = w.dead ? LIFESPAN : (Date.now() - w.birth);
  const t = Math.max(0, Math.min(1, (age-GRAY_START)/(LIFESPAN-GRAY_START)));
  const lerp = (c) => c.map(v => Math.round(v + (128-v)*t));
  return { body: lerp(w.color), head: lerp(darken(w.color)) };
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.textAlign='center'; ctx.textBaseline='middle';

  ctx.strokeStyle = '#7a5a3a';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  for(const wall of walls){
    const pts = wall.points;
    if(pts.length < 2) continue;
    ctx.lineWidth = wall.thickness || 16;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
  }

  ctx.font = '22px sans-serif';
  for(const p of plants) ctx.fillText('🌿', p.x, p.y);

  for(const f of foods){
    const val = f.value || 1;
    ctx.font = (13 + val*2) + 'px sans-serif';
    ctx.fillText(f.emoji || '🍎', f.x, f.y);
  }

  for(const w of worms){
    const {body, head} = ageColor(w);
    const color = `rgb(${body.join(',')})`;
    const headColor = `rgb(${head.join(',')})`;
    const steps = Math.floor(Math.min(w.trail.length-1, SPACING*w.length) / SPACING);
    for(let s=steps; s>=0; s--){
      const i = s*SPACING;
      const seg = w.trail[i];
      if(!seg) continue;
      ctx.beginPath();
      ctx.fillStyle = i===0 ? headColor : color;
      ctx.arc(seg.x, seg.y, i===0 ? SEG_R+2 : SEG_R, 0, Math.PI*2);
      ctx.fill();
    }
  }

  for(const ev of matingEvents){
    const t = Math.min((Date.now()-ev.start)/ev.duration, 1);
    ctx.font = (14 + t*10) + 'px sans-serif';
    ctx.fillText('🥚', ev.cx, ev.cy);
  }

  if(paused){
    ctx.font = '30px sans-serif';
    ctx.textAlign = 'left';
    ctx.globalAlpha = 0.85;
    ctx.fillText('⏸️', 14, 30);
    ctx.globalAlpha = 1;
  }
}

function updateDragTrails(){
  for(const w of worms){
    if(w.dragging) pushTrail(w);
  }
}

function loop(){
  updateDragTrails();
  if(!paused){
    updatePlants();
    updateMatingEvents();
    updateWorms();
  }
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
